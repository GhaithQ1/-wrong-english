<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wrong English</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">

  <header>
    <h1>Wrong English</h1>
    <div id="user-bar" class="hidden">
      <span id="user-name"></span>
      <span class="badge">Lv. <span id="user-level">1</span></span>
      <span class="badge">XP <span id="user-xp">0</span></span>
      <span class="badge coin">🪙 <span id="user-coins">0</span></span>
      <span class="badge star">⭐ <span id="user-stars">0</span></span>
    </div>
    <div style="margin-top:0.5rem;display:flex;gap:0.5rem;justify-content:center;align-items:center;">
      <button id="notif-btn" class="btn sm hidden" onclick="toggleNotifications()" style="position:relative;">
        🔔<span id="notif-badge" class="notif-badge hidden">0</span>
      </button>
      <button id="profile-btn" class="btn sm hidden" onclick="showProfile()">Profile</button>
      <button id="leaderboard-btn" class="btn sm hidden" onclick="showLeaderboard()">Leaderboard</button>
      <a id="admin-link" class="btn sm hidden" href="/admin.html">Admin</a>
      <button id="logout-btn" class="btn sm hidden" onclick="logout()">Logout</button>
    </div>
    <div id="notif-dropdown" class="notif-dropdown hidden"></div>
  </header>

  <!-- Auth Screen -->
  <section id="auth-screen">
    <h2>Login / Register</h2>
    <div class="form-grid">
      <input type="text" id="auth-name" placeholder="Name (register only)" />
      <input type="email" id="auth-email" placeholder="Email" />
      <input type="password" id="auth-password" placeholder="Password" />
    </div>
    <div class="btn-group">
      <button class="btn" onclick="register()">Register</button>
      <button class="btn" onclick="login()">Login</button>
    </div>
    <div style="margin-top:1rem;border-top:1px solid #2a2a3e;padding-top:1rem;">
      <button class="btn google-btn" onclick="googleLogin()">
        <svg width="18" height="18" viewBox="0 0 48 48" style="vertical-align:middle;margin-right:6px;"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.56 10.56l7.97-5.97z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>
    </div>
    <button class="btn link-btn" onclick="showForgotPassword()" style="margin-top:0.75rem;width:100%;">Forgot Password?</button>
    <div id="auth-error" class="error"></div>
  </section>

  <!-- Forgot Password Screen -->
  <section id="forgot-screen" class="hidden">
    <h2>Forgot Password</h2>
    <div id="forgot-stage-1">
      <p style="font-size:0.85rem;color:#888;margin-bottom:0.75rem;">Enter your email to receive a verification code.</p>
      <div class="form-grid">
        <input type="email" id="forgot-email" placeholder="Your email" />
      </div>
      <div class="btn-group">
        <button class="btn primary" onclick="sendResetCode()">Send Code</button>
        <button class="btn" onclick="backFromForgot()">Back</button>
      </div>
    </div>
    <div id="forgot-stage-2" class="hidden">
      <p style="font-size:0.85rem;color:#888;margin-bottom:0.75rem;">Enter the 6-digit code sent to <span id="forgot-email-display" style="color:#f0c040;"></span></p>
      <div class="code-inputs">
        <input type="text" class="code-box" id="code-0" maxlength="1" inputmode="numeric" pattern="[0-9]" autofocus />
        <input type="text" class="code-box" id="code-1" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="text" class="code-box" id="code-2" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="text" class="code-box" id="code-3" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="text" class="code-box" id="code-4" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        <input type="text" class="code-box" id="code-5" maxlength="1" inputmode="numeric" pattern="[0-9]" />
      </div>
      <div class="form-grid" style="margin-top:0.75rem;">
        <input type="password" id="reset-password" placeholder="New password (min 6 chars)" />
        <input type="password" id="reset-confirm" placeholder="Confirm new password" />
      </div>
      <div class="btn-group">
        <button class="btn primary" onclick="resetPassword()">Reset Password</button>
        <button class="btn" onclick="showForgotPassword()">Back</button>
      </div>
    </div>
    <div id="forgot-msg" class="profile-msg"></div>
  </section>

  <!-- Leaderboard Screen -->
  <section id="leaderboard-screen" class="hidden">
    <div class="section-header">
      <h2>🏆 Leaderboard</h2>
      <button class="btn sm" onclick="backFromLeaderboard()">Back</button>
    </div>
    <div id="leaderboard-loading" style="text-align:center;padding:1rem;color:#888;">Loading...</div>
    <div id="leaderboard-list"></div>
  </section>

  <!-- Daily Login -->
  <section id="daily-section" class="hidden">
    <div class="daily-header">
      <span class="daily-title">Daily Login</span>
      <span id="daily-day-label" class="daily-day-label">Day 0 / 7</span>
    </div>
    <div id="daily-grid" class="daily-grid"></div>
    <button id="daily-claim-btn" class="btn primary" onclick="claimDaily()">Claim</button>
    <p id="daily-message" class="daily-message"></p>
  </section>

  <!-- Traps Section -->
  <section id="traps-section" class="hidden">
    <div class="section-header">
      <h2>🪤 Traps</h2>
      <button class="btn sm" onclick="toggleCreateTrap()">+ Create</button>
    </div>
    <div id="create-trap-form" class="hidden" style="display:grid;gap:0.5rem;margin-bottom:0.75rem;">
      <input type="text" id="trap-sentence" placeholder="Enter a wrong English sentence..." />
      <button class="btn primary" onclick="submitTrap()" id="trap-submit-btn">Create Trap</button>
      <div id="trap-validation-msg" class="error" style="display:none;"></div>
    </div>
    <div class="trap-tabs">
      <button id="tab-my" class="btn sm trap-tab active" onclick="switchTrapTab(true)">My Traps</button>
      <button id="tab-all" class="btn sm trap-tab" onclick="switchTrapTab(false)">All Traps</button>
    </div>
    <div id="trap-filter-bar" class="trap-filter-bar hidden">
      <button class="btn sm filter-btn active" data-diff="" onclick="filterTraps('')">All</button>
      <button class="btn sm filter-btn" data-diff="easy" onclick="filterTraps('easy')">Easy</button>
      <button class="btn sm filter-btn" data-diff="medium" onclick="filterTraps('medium')">Medium</button>
      <button class="btn sm filter-btn" data-diff="hard" onclick="filterTraps('hard')">Hard</button>
    </div>
    <div id="traps-list"></div>
  </section>

  <!-- Topics Screen -->
  <section id="topics-screen" class="hidden">
    <div id="profile-card" class="profile-card hidden">
      <div class="profile-card-avatar">
        <div id="pc-avatar-placeholder" class="pc-avatar-letter"></div>
        <img id="pc-avatar" class="pc-avatar-img hidden" src="" alt="" />
      </div>
      <div class="profile-card-info">
        <span id="pc-name" class="pc-name"></span>
        <span id="pc-level" class="pc-level"></span>
        <div class="pc-stats">
          <span>XP <span id="pc-xp">0</span></span>
          <span>🪙 <span id="pc-coins">0</span></span>
          <span>⭐ <span id="pc-stars">0</span></span>
        </div>
      </div>
    </div>
    <div class="section-header">
      <h2>Topics</h2>
      <button class="btn sm" onclick="refreshUser()">Refresh</button>
    </div>
    <div id="topics-list"></div>
  </section>

  <!-- Sections Screen (between Topics and Quiz) -->
  <section id="sections-screen" class="hidden">
    <div class="section-header">
      <h2 id="sections-topic-name"></h2>
      <button class="btn sm" onclick="backFromSections()">Back</button>
    </div>
    <div id="sections-list"></div>
  </section>

  <!-- Quiz Screen -->
  <section id="quiz-screen" class="hidden">
    <div class="section-header">
      <button class="btn sm" onclick="backFromQuiz()">Back</button>
      <span id="quiz-section-label" style="font-size:0.85rem;color:#888;"></span>
    </div>
    <h2 id="quiz-title"></h2>
    <div id="questions-container"></div>
    <button id="submit-section-btn" class="btn primary" onclick="submitCurrentPart()">Submit</button>
  </section>

  <!-- Part Result Screen -->
  <section id="part-result-screen" class="hidden">
    <h2 id="part-result-title">Result</h2>
    <div id="part-result-content"></div>
    <div style="display:flex;gap:0.5rem;margin-top:0.5rem;">
      <button id="part-result-next-btn" class="btn primary" onclick="nextAfterResult()" style="flex:1;">Continue</button>
    </div>
  </section>

  <!-- Result Screen (section complete) -->
  <section id="result-screen" class="hidden">
    <h2>Section Complete!</h2>
    <div id="result-content"></div>
    <div style="display:flex;gap:0.5rem;margin-top:0.5rem;">
      <button class="btn" onclick="backToSections()" style="flex:1;">Back to Sections</button>
      <button id="retry-btn" class="btn danger" onclick="retrySection()" style="flex:1;">Retry (10🪙)</button>
    </div>
  </section>

  <!-- Profile Screen -->
  <section id="profile-screen" class="hidden">
    <div class="profile-header">
      <div class="profile-avatar-wrapper" onclick="document.getElementById('profile-avatar-input').click()">
        <div id="profile-avatar-placeholder" class="profile-avatar-letter"></div>
        <img id="profile-avatar-img" class="hidden" src="" alt="Avatar" />
        <div class="profile-avatar-overlay">Change</div>
      </div>
      <input type="file" id="profile-avatar-input" accept="image/*" class="hidden" />
      <p id="profile-file-name" class="profile-file-name"></p>
    </div>
    <div class="profile-info">
      <div class="profile-field">
        <label>Name</label>
        <input type="text" id="profile-name-input" />
      </div>
      <div class="profile-field">
        <label>Email</label>
        <span id="profile-email"></span>
      </div>
    </div>
    <div style="display:flex;gap:0.5rem;margin-top:0.75rem;">
      <button class="btn primary" onclick="saveProfile()" style="flex:1;">Save Changes</button>
      <button class="btn" onclick="backFromProfile()" style="flex:1;">Cancel</button>
    </div>
    <div id="profile-msg" class="profile-msg"></div>
  </section>

  <footer><pre id="output" class="main-output hidden"></pre></footer>
</div>

<script src="app.js"></script>
</body>
</html>
