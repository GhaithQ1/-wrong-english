<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Wrong English</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
  <header>
    <h1>Admin Panel</h1>
    <a href="/" style="color:#f0c040;font-size:0.85rem;">Back to App</a>
  </header>

  <section>
    <h2>Stats</h2>
    <button class="btn" onclick="loadStats()">Refresh Stats</button>
    <div id="stats" style="margin-top:0.75rem;"></div>
  </section>

  <section>
    <h2>Users</h2>
    <button class="btn" onclick="loadUsers()">Refresh Users</button>
    <div id="users-list" style="margin-top:0.75rem;"></div>
  </section>

  <section>
    <h2>Topics</h2>
    <button class="btn" onclick="loadTopicsList()">Refresh Topics</button>
    <div id="topics-list" style="margin-top:0.75rem;"></div>
  </section>

  <section>
    <h2 id="form-title">Create Topic</h2>
    <div class="form-grid">
      <input type="text" id="topic-name" placeholder="Topic name" />
      <div style="display:flex;gap:0.5rem;align-items:center;">
        <input type="file" id="topic-image-input" accept="image/*" style="flex:1;" />
        <button class="btn sm" onclick="uploadTopicImage()">Upload</button>
      </div>
      <div id="topic-image-preview" class="hidden" style="display:flex;align-items:center;gap:0.5rem;">
        <img id="topic-image-img" src="" style="width:60px;height:60px;border-radius:8px;object-fit:cover;border:1px solid #2a2a3e;" />
        <button class="btn sm danger" onclick="removeTopicImage()">Remove</button>
      </div>
      <input type="hidden" id="topic-image" value="" />
      <div style="display:flex;gap:0.5rem;">
        <input type="number" id="topic-order" placeholder="Order (1-10)" style="flex:1;" />
        <input type="number" id="topic-unlock" placeholder="Stars to unlock" style="flex:1;" />
      </div>
    </div>
    <div style="display:flex;gap:0.5rem;margin-top:0.75rem;">
      <button class="btn sm" onclick="addSection()">+ Add Section</button>
    </div>
    <div id="sections-container"></div>
    <div style="display:flex;gap:0.5rem;margin-top:1rem;">
      <button class="btn primary" id="save-topic-btn" onclick="createTopic()" style="flex:1;">Create Topic</button>
      <button class="btn" id="cancel-edit-btn" onclick="cancelEdit()" style="display:none;">Cancel</button>
    </div>
  </section>

  <footer><pre id="output" class="main-output hidden"></pre></footer>
</div>

<script src="admin.js"></script>
</body>
</html>
